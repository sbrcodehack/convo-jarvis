<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ConvoJarvis - Final Fix</title>
<style>
  body { background: #050505; color: #00f7ff; text-align: center; font-family: 'Courier New', monospace; padding: 20px; }
  .container { max-width: 500px; margin: auto; border: 1px solid #00f7ff; padding: 20px; box-shadow: 0 0 20px #004c4e; border-radius: 10px; }
  
  #timer { font-size: 4rem; color: #fff; font-variant-numeric: tabular-nums; margin: 10px 0; }
  #status-text { font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 15px; color: #aaa; }

  /* Visualizers */
  #meter-container { width: 100%; height: 12px; background: #111; margin: 10px auto; position: relative; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
  #meter-fill { height: 100%; width: 0%; background: #00f7ff; transition: width 0.05s; }
  #threshold-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff0055; z-index: 2; }

  .control-panel { background: #111; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #222; }
  input[type=range] { width: 100%; cursor: pointer; accent-color: #00f7ff; }

  button { 
    padding: 15px 25px; margin: 5px; cursor: pointer; border: 1px solid #00f7ff; 
    background: transparent; color: #00f7ff; font-weight: bold; border-radius: 4px;
  }
  button:hover:not(:disabled) { background: #00f7ff; color: #000; box-shadow: 0 0 15px #00f7ff; }
  button:disabled { border-color: #333; color: #333; cursor: not-allowed; opacity: 0.3; }

  .recording-card { background: #111; padding: 15px; margin: 15px 0; border: 1px solid #00f7ff; border-radius: 8px; text-align: left; }
  audio { width: 100%; margin-top: 10px; filter: invert(100%) hue-rotate(180deg); }
  .timestamp { color: #00ff88; font-size: 0.8rem; }
</style>
</head>
<body>

<div class="container">
  <h1>CONVO-JARVIS</h1>
  <div id="status-text">SYSTEM STANDBY</div>
  <div id="timer">0.0s</div>

  <div id="meter-container">
    <div id="threshold-line" style="left: 15%;"></div>
    <div id="meter-fill"></div>
  </div>

  <div class="control-panel">
    <label style="font-size: 0.7rem;">SENSITIVITY: <span id="sensVal">0.040</span></label>
    <input type="range" id="sensSlider" min="0.010" max="0.200" step="0.005" value="0.040" oninput="updateSensitivity(this.value)">
  </div>

  <button id="startBtn" onclick="initSystem()">ACTIVATE SYSTEM</button>
  <button id="saveBtn" onclick="generateFile()" disabled>💾 GENERATE AUDIO</button>
  <button id="stopBtn" onclick="shutdown()" disabled>SHUTDOWN</button>

  <div id="recordings"></div>
</div>

<script>
let stream, audioContext, analyser, dataArray;
let mediaRecorder;
let finalChunks = []; // This stores the actual blobs
let isCapturing = false;
let accumulatedTime = 0;
let lastTime = 0;
let threshold = 0.040;

function updateSensitivity(val) {
  threshold = parseFloat(val);
  document.getElementById("sensVal").innerText = val;
  document.getElementById("threshold-line").style.left = Math.min(threshold * 500, 100) + "%";
}

async function initSystem() {
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioContext.createAnalyser();
  const source = audioContext.createMediaStreamSource(stream);
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  source.connect(analyser);

  document.getElementById("startBtn").disabled = true;
  document.getElementById("stopBtn").disabled = false;
  document.getElementById("status-text").innerText = "LISTENING FOR VOICE...";
  
  lastTime = performance.now();
  loop();
}

function loop() {
  if (!stream) return;
  const now = performance.now();
  const delta = now - lastTime;
  lastTime = now;

  analyser.getByteTimeDomainData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }
  let rms = Math.sqrt(sum / dataArray.length);

  // Meter visual
  document.getElementById("meter-fill").style.width = Math.min(rms * 500, 100) + "%";

  if (rms > threshold) {
    if (!isCapturing) startRecording();
    accumulatedTime += delta;
    document.getElementById("timer").style.color = "#00f7ff";
    document.getElementById("status-text").innerText = "RECORDING...";
  } else {
    if (isCapturing) stopRecording();
    document.getElementById("timer").style.color = "#333";
    document.getElementById("status-text").innerText = "WAITING...";
  }

  const totalSecs = (accumulatedTime / 1000).toFixed(1);
  document.getElementById("timer").innerText = totalSecs + "s";
  document.getElementById("saveBtn").disabled = (accumulatedTime < 1000);

  requestAnimationFrame(loop);
}

function startRecording() {
  isCapturing = true;
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) finalChunks.push(e.data);
  };
  mediaRecorder.start();
}

function stopRecording() {
  isCapturing = false;
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }
}

function generateFile() {
  if (finalChunks.length === 0) return;

  // Combine all valid WebM segments into one blob
  const blob = new Blob(finalChunks, { type: "audio/webm" });
  const url = URL.createObjectURL(blob);
  
  const card = document.createElement("div");
  card.className = "recording-card";
  card.innerHTML = `
    <div class="timestamp">ENTRY LOG: ${new Date().toLocaleTimeString()}</div>
    <div>Captured: ${(accumulatedTime/1000).toFixed(1)}s</div>
    <audio controls src="${url}"></audio>
  `;
  
  document.getElementById("recordings").prepend(card);

  // Reset Session
  finalChunks = [];
  accumulatedTime = 0;
}

function shutdown() {
  location.reload(); 
}
</script>
</body>
</html>
