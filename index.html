<!DOCTYPE html>
<html>
<head>
  <title>Working VAD Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.27/dist/index.min.js"></script>
</head>
<body>

<button onclick="start()">Start</button>
<div id="status">Idle</div>

<script>
async function start() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const myvad = await vad.VAD.create({
    stream: stream,

    onSpeechStart: () => {
      document.getElementById("status").innerText = "🟢 Speaking";
    },

    onSpeechEnd: () => {
      document.getElementById("status").innerText = "🔴 Silent";
    }
  });

  myvad.start();

  document.getElementById("status").innerText = "Listening...";
}
</script>

</body>
</html>
