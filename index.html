<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ConvoJarvis - Manual Clipper</title>
<style>
  body { background: #050505; color: #00f7ff; text-align: center; font-family: 'Courier New', monospace; }
  .container { max-width: 500px; margin: auto; border: 1px solid #00f7ff; padding: 20px; box-shadow: 0 0 20px #004c4e; }
  
  button { 
    padding: 12px 20px; margin: 5px; cursor: pointer; border: 1px solid #00f7ff; 
    background: transparent; color: #00f7ff; font-weight: bold; transition: 0.3s;
  }
  button:hover { background: #00f7ff; color: #000; box-shadow: 0 0 15px #00f7ff; }
  button:disabled { border-color: #333; color: #333; cursor: not-allowed; }

  #status { font-size: 1.2rem; margin: 15px; text-transform: uppercase; letter-spacing: 2px; }
  #timer { font-size: 3rem; margin-bottom: 10px; color: #fff; }

  /* Volume Meter Bar */
  #meter-container { width: 80%; height: 10px; background: #111; margin: 20px auto; border-radius: 5px; overflow: hidden; }
  #meter-fill { height: 100%; width: 0%; background: #00f7ff; transition: width 0.1s; box-shadow: 0 0 10px #00f7ff; }

  .recording-card { background: #111; padding: 10px; margin: 10px 0; border: 1px solid #333; border-radius: 4px; }
  audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
</style>
</head>
<body>

<div class="container">
  <h1>CONVO-JARVIS</h1>
  
  <div id="status">System Offline</div>
  <div id="timer">0.0s</div>

  <div id="meter-container">
    <div id="meter-fill"></div>
  </div>

  <button id="startBtn" onclick="start()">START SYSTEM</button>
  <button id="saveBtn" onclick="saveSegment()" disabled>💾 SAVE CHUNK</button>
  <button id="stopBtn" onclick="stop()" disabled>⛔ SHUTDOWN</button>

  <hr style="border: 0.5px solid #111; margin: 20px 0;">
  
  <h3>ARCHIVED CHUNKS</h3>
  <div id="recordings"></div>
</div>

<script>
let stream, mediaRecorder, audioContext, analyser, dataArray;
let chunks = [];
let startTime;
let timerInterval;
let animationId;

async function start() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    
    // Setup Audio Visualizer
    audioContext = new AudioContext();
    analyser = audioContext.createAnalyser();
    const source = audioContext.createMediaStreamSource(stream);
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);

    // Setup Recorder
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
    
    // Start Recording
    mediaRecorder.start(200); // Send data chunks every 200ms
    startTime = Date.now();
    
    // UI State
    document.getElementById("startBtn").disabled = true;
    document.getElementById("saveBtn").disabled = false;
    document.getElementById("stopBtn").disabled = false;
    document.getElementById("status").innerText = "🎧 System Active";
    
    updateVisuals();
  } catch (err) {
    alert("Microphone access is required.");
  }
}

function updateVisuals() {
  // Timer Logic
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  document.getElementById("timer").innerText = elapsed + "s";

  // Volume Meter Logic
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
  let average = sum / dataArray.length;
  document.getElementById("meter-fill").style.width = Math.min(average * 2, 100) + "%";

  animationId = requestAnimationFrame(updateVisuals);
}

function saveSegment() {
  // If no chunks yet, wait a moment
  if (chunks.length === 0) return;

  // 1. Create the Audio File from current chunks
  const blob = new Blob(chunks, { type: "audio/webm" });
  const url = URL.createObjectURL(blob);
  const duration = document.getElementById("timer").innerText;
  
  // 2. Add to UI
  const div = document.createElement("div");
  div.className = "recording-card";
  div.innerHTML = `<small>CHUNCK SAVED: ${new Date().toLocaleTimeString()} (${duration})</small>`;
  const audio = document.createElement("audio");
  audio.controls = true;
  audio.src = url;
  div.appendChild(audio);
  document.getElementById("recordings").prepend(div);

  // 3. IMPORTANT: Reset Chunks and Timer for the "Next" segment
  // The recorder keeps running, but we empty the array to start fresh.
  chunks = [];
  startTime = Date.now(); 
  
  // Visual Feedback
  document.getElementById("status").innerText = "✨ Chunk Archived";
  setTimeout(() => { 
    if(mediaRecorder.state === "recording") document.getElementById("status").innerText = "🎧 System Active";
  }, 2000);
}

function stop() {
  cancelAnimationFrame(animationId);
  if (mediaRecorder) mediaRecorder.stop();
  if (stream) stream.getTracks().forEach(t => t.stop());
  
  document.getElementById("startBtn").disabled = false;
  document.getElementById("saveBtn").disabled = true;
  document.getElementById("stopBtn").disabled = true;
  document.getElementById("status").innerText = "System Offline";
  document.getElementById("meter-fill").style.width = "0%";
}
</script>

</body>
</html>
