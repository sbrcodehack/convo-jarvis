<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ConvoJarvis - Cumulative Recorder</title>
<style>
  body { background: #050505; color: #00f7ff; text-align: center; font-family: 'Courier New', monospace; }
  .container { max-width: 500px; margin: auto; border: 1px solid #00f7ff; padding: 20px; box-shadow: 0 0 20px #004c4e; }
  
  .control-panel { background: #111; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #222; }
  label { display: block; margin-bottom: 10px; font-size: 0.8rem; letter-spacing: 1px; }
  input[type=range] { width: 100%; cursor: pointer; accent-color: #00f7ff; }

  button { 
    padding: 12px 20px; margin: 5px; cursor: pointer; border: 1px solid #00f7ff; 
    background: transparent; color: #00f7ff; font-weight: bold; transition: 0.3s;
  }
  button:hover:not(:disabled) { background: #00f7ff; color: #000; box-shadow: 0 0 15px #00f7ff; }
  button:disabled { border-color: #333; color: #333; cursor: not-allowed; }

  #status { font-size: 1.1rem; margin: 15px; height: 24px; }
  #timer { font-size: 4rem; margin-bottom: 10px; color: #fff; font-variant-numeric: tabular-nums; }

  #meter-container { width: 100%; height: 15px; background: #111; margin: 10px auto; position: relative; overflow: hidden; border: 1px solid #333; }
  #meter-fill { height: 100%; width: 0%; background: #00f7ff; transition: width 0.05s; }
  #threshold-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff0055; z-index: 2; }

  .recording-card { background: #111; padding: 15px; margin: 10px 0; border: 1px solid #00f7ff; border-radius: 4px; text-align: left; animation: fadeIn 0.5s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  
  audio { width: 100%; margin-top: 8px; filter: invert(100%) hue-rotate(180deg); }
  .indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; background: #333; }
  .active-led { background: #ff0055; box-shadow: 0 0 8px #ff0055; }
</style>
</head>
<body>

<div class="container">
  <h1>CONVO-JARVIS v3</h1>
  
  <div id="status"><span id="led" class="indicator"></span>SYSTEM STANDBY</div>
  <div id="timer">0.0s</div>

  <div id="meter-container">
    <div id="threshold-line" style="left: 14%;"></div>
    <div id="meter-fill"></div>
  </div>

  <div class="control-panel">
    <label for="sensSlider">SENSITIVITY: <span id="sensVal">0.035</span></label>
    <input type="range" id="sensSlider" min="0.005" max="0.200" step="0.005" value="0.035" oninput="updateSensitivity(this.value)">
  </div>

  <button id="startBtn" onclick="start()">ACTIVATE</button>
  <button id="saveBtn" onclick="saveSegment()" disabled>💾 GENERATE AUDIO</button>
  <button id="stopBtn" onclick="stop()" disabled>⛔ STOP MIC</button>

  <div id="recordings" style="margin-top: 30px;"></div>
</div>

<script>
let stream, mediaRecorder, audioContext, analyser, dataArray;
let voiceChunks = [];
let accumulatedTimeMs = 0;
let lastTimestamp = 0;
let isSpeaking = false;
let animationId;
let THRESHOLD = 0.035; 

function updateSensitivity(val) {
  THRESHOLD = parseFloat(val);
  document.getElementById("sensVal").innerText = val;
  let percent = Math.min(THRESHOLD * 400, 100);
  document.getElementById("threshold-line").style.left = percent + "%";
}

async function start() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    const source = audioContext.createMediaStreamSource(stream);
    analyser.fftSize = 512;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);

    mediaRecorder = new MediaRecorder(stream);
    
    // THE APPEND LOGIC: 
    // We keep pushing to the same voiceChunks array until 'Save' is clicked
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0 && isSpeaking) {
        voiceChunks.push(e.data);
      }
    };

    mediaRecorder.start(100);
    lastTimestamp = performance.now();
    
    document.getElementById("startBtn").disabled = true;
    document.getElementById("saveBtn").disabled = false;
    document.getElementById("stopBtn").disabled = false;
    
    process();
  } catch (err) {
    alert("Mic Error: " + err);
  }
}

function process() {
  const now = performance.now();
  const deltaTime = now - lastTimestamp;
  lastTimestamp = now;

  analyser.getByteTimeDomainData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }
  let rms = Math.sqrt(sum / dataArray.length);

  document.getElementById("meter-fill").style.width = Math.min(rms * 400, 100) + "%";

  if (rms > THRESHOLD) {
    isSpeaking = true;
    accumulatedTimeMs += deltaTime;
    document.getElementById("status").innerHTML = '<span class="indicator active-led"></span>APPENDING VOICE...';
    document.getElementById("timer").style.color = "#00f7ff";
  } else {
    isSpeaking = false;
    document.getElementById("status").innerHTML = '<span class="indicator"></span>SILENCE DETECTED';
    document.getElementById("timer").style.color = "#222";
  }

  document.getElementById("timer").innerText = (accumulatedTimeMs / 1000).toFixed(1) + "s";
  animationId = requestAnimationFrame(process);
}

function saveSegment() {
  if (voiceChunks.length === 0) return;

  // Create the file from the accumulated chunks
  const blob = new Blob(voiceChunks, { type: "audio/webm" });
  const url = URL.createObjectURL(blob);
  
  const div = document.createElement("div");
  div.className = "recording-card";
  div.innerHTML = `<strong>VOICE LOG [${new Date().toLocaleTimeString()}]</strong><br>
                   <small>Total Speech Captured: ${(accumulatedTimeMs / 1000).toFixed(1)}s</small>`;
  
  const audio = document.createElement("audio");
  audio.controls = true;
  audio.src = url;
  
  div.appendChild(audio);
  document.getElementById("recordings").prepend(div);

  // After saving, we reset the current session buffer
  voiceChunks = [];
  accumulatedTimeMs = 0;
  document.getElementById("timer").innerText = "0.0s";
}

function stop() {
  // Stop the recording and loop without refreshing the page
  cancelAnimationFrame(animationId);
  if (mediaRecorder) mediaRecorder.stop();
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioContext) audioContext.close();

  document.getElementById("startBtn").disabled = false;
  document.getElementById("saveBtn").disabled = true;
  document.getElementById("stopBtn").disabled = true;
  document.getElementById("status").innerHTML = '<span class="indicator"></span>MIC DEACTIVATED';
  document.getElementById("meter-fill").style.width = "0%";
}
</script>

</body>
</html>
