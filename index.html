<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ConvoJarvis - 10s Voice Recorder</title>

<style>
  body {
    background: black;
    color: #00f7ff;
    text-align: center;
    font-family: Arial;
  }
  button {
    padding: 12px 20px;
    margin: 10px;
    background: #00f7ff;
    border: none;
    cursor: pointer;
  }
  #status {
    font-size: 22px;
    margin: 15px;
  }
  audio {
    display: block;
    margin: 10px auto;
  }
</style>
</head>

<body>

<h1>🧠 ConvoJarvis (10s Voice)</h1>

<button onclick="start()">🎤 Start</button>
<button onclick="stop()">⛔ Stop</button>

<div id="status">Idle</div>
<div id="timer">Voice Time: 0s</div>

<h3>Saved Recordings</h3>
<div id="recordings"></div>

<script>
let audioContext, analyser, microphone, dataArray;
let mediaRecorder, stream;

let tempChunks = [];
let voiceChunks = [];

let isSpeaking = false;
let silenceTimer;

let smoothed = 0;

// 🔧 SETTINGS
const RMS_THRESHOLD = 0.02;
const SILENCE_DELAY = 1500;
const SMOOTHING = 0.8;
const MIN_VOICE_TIME = 10000; // 10 seconds

let voiceStartTime = null;

async function start() {
  document.getElementById("status").innerText = "Initializing...";

  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new AudioContext();
  analyser = audioContext.createAnalyser();
  microphone = audioContext.createMediaStreamSource(stream);

  analyser.fftSize = 2048;
  dataArray = new Uint8Array(analyser.fftSize);

  microphone.connect(analyser);

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = (e) => {
    tempChunks.push(e.data);
  };

  mediaRecorder.start(300);

  detect();

  document.getElementById("status").innerText = "🎧 Listening...";
}

function detect() {
  requestAnimationFrame(detect);

  analyser.getByteTimeDomainData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    let val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }

  let rms = Math.sqrt(sum / dataArray.length);
  smoothed = SMOOTHING * smoothed + (1 - SMOOTHING) * rms;

  if (smoothed > RMS_THRESHOLD) {
    document.getElementById("status").innerText = "🟢 Speaking";

    if (!isSpeaking) {
      isSpeaking = true;
      voiceStartTime = Date.now();
    }

    clearTimeout(silenceTimer);

  } else {
    document.getElementById("status").innerText = "🔴 Silent";

    if (isSpeaking) {
      silenceTimer = setTimeout(() => {
        isSpeaking = false;
        voiceStartTime = null;
      }, SILENCE_DELAY);
    }
  }

  processChunks();
  updateTimer();
}

function processChunks() {
  if (tempChunks.length > 0) {

    if (isSpeaking) {
      voiceChunks.push(...tempChunks);
    }

    tempChunks = [];
  }

  // 🔥 Check if 10 sec reached
  if (voiceStartTime && (Date.now() - voiceStartTime >= MIN_VOICE_TIME)) {
    saveRecording();
    voiceStartTime = Date.now(); // continue next segment
  }
}

function updateTimer() {
  if (voiceStartTime) {
    let seconds = ((Date.now() - voiceStartTime) / 1000).toFixed(1);
    document.getElementById("timer").innerText = "Voice Time: " + seconds + "s";
  } else {
    document.getElementById("timer").innerText = "Voice Time: 0s";
  }
}

function saveRecording() {
  if (voiceChunks.length === 0) return;

  const blob = new Blob(voiceChunks, { type: "audio/webm" });
  const url = URL.createObjectURL(blob);

  const audio = document.createElement("audio");
  audio.controls = true;
  audio.src = url;

  document.getElementById("recordings").appendChild(audio);

  voiceChunks = [];
}

function stop() {
  mediaRecorder.stop();
  saveRecording();
  document.getElementById("status").innerText = "⛔ Stopped";
}
</script>

</body>
</html>
