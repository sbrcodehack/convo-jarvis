<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ConvoJarvis - Mobile Background Fix</title>
<style>
  body { background: #050505; color: #00f7ff; text-align: center; font-family: 'Courier New', monospace; padding: 20px; }
  .container { max-width: 500px; margin: auto; border: 1px solid #00f7ff; padding: 20px; box-shadow: 0 0 20px #004c4e; border-radius: 10px; }
  #timer { font-size: 4rem; color: #fff; margin: 10px 0; }
  #status-text { font-size: 0.9rem; letter-spacing: 2px; color: #aaa; margin-bottom: 10px; }
  #meter-container { width: 100%; height: 12px; background: #111; margin: 10px auto; position: relative; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
  #meter-fill { height: 100%; width: 0%; background: #00f7ff; }
  #threshold-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff0055; z-index: 2; }
  .control-panel { background: #111; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #222; }
  input[type=range] { width: 100%; accent-color: #00f7ff; cursor: pointer; }
  button { padding: 12px 20px; margin: 5px; cursor: pointer; border: 1px solid #00f7ff; background: transparent; color: #00f7ff; font-weight: bold; border-radius: 4px; }
  button:hover:not(:disabled) { background: #00f7ff; color: #000; }
  button:disabled { border-color: #333; color: #333; opacity: 0.3; }
  .recording-card { background: #111; padding: 15px; margin: 15px 0; border: 1px solid #333; border-radius: 8px; text-align: left; border-left: 4px solid #00f7ff; }
  audio { width: 100%; margin-top: 10px; filter: invert(100%) hue-rotate(180deg); }
  .wake-status { font-size: 0.6rem; color: #ff0055; margin-top: 5px; }
</style>
</head>
<body>

<div class="container">
  <h1>CONVO-JARVIS</h1>
  <div id="status-text">OFFLINE</div>
  <div id="timer">0.0s</div>
  <div id="wake-info" class="wake-status">BACKGROUND LOCK: INACTIVE</div>

  <div id="meter-container">
    <div id="threshold-line" style="left: 15%;"></div>
    <div id="meter-fill"></div>
  </div>

  <div class="control-panel">
    <label style="font-size: 0.7rem;">SENSITIVITY: <span id="sensVal">0.040</span></label>
    <input type="range" id="sensSlider" min="0.010" max="0.200" step="0.005" value="0.040" oninput="updateSensitivity(this.value)">
  </div>

  <button id="startBtn" onclick="initSystem()">ACTIVATE</button>
  <button id="saveBtn" onclick="generateFile()" disabled>💾 GENERATE</button>
  <button id="stopBtn" onclick="shutdown()" disabled>⛔ SHUTDOWN</button>

  <div id="recordings"></div>
</div>

<script>
let audioContext, processor, input, stream, wakeLock = null;
let leftChannel = [];
let accumulatedTime = 0;
let threshold = 0.040;

function updateSensitivity(val) {
  threshold = parseFloat(val);
  document.getElementById("sensVal").innerText = val;
  document.getElementById("threshold-line").style.left = (threshold * 500) + "%";
}

// 🟢 NEW: Request Wake Lock to keep screen/process alive
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById("wake-info").innerText = "BACKGROUND LOCK: ACTIVE";
      document.getElementById("wake-info").style.color = "#00ff88";
    }
  } catch (err) {
    document.getElementById("wake-info").innerText = "BACKGROUND LOCK: FAILED (Low Battery?)";
  }
}

async function initSystem() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    
    // Resume or Start AudioContext
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (audioContext.state === 'suspended') await audioContext.resume();

    input = audioContext.createMediaStreamSource(stream);
    processor = audioContext.createScriptProcessor(4096, 1, 1);
    
    input.connect(processor);
    processor.connect(audioContext.destination);

    // Request Lock
    await requestWakeLock();

    processor.onaudioprocess = (e) => {
      const data = e.inputBuffer.getChannelData(0);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      let rms = Math.sqrt(sum / data.length);

      document.getElementById("meter-fill").style.width = Math.min(rms * 500, 100) + "%";

      if (rms > threshold) {
        leftChannel.push(new Float32Array(data));
        accumulatedTime += (4096 / audioContext.sampleRate);
        document.getElementById("status-text").innerText = "• RECORDING •";
        document.getElementById("status-text").style.color = "#00ff88";
      } else {
        document.getElementById("status-text").innerText = "IDLE (WAITING)";
        document.getElementById("status-text").style.color = "#aaa";
      }

      document.getElementById("timer").innerText = accumulatedTime.toFixed(1) + "s";
      document.getElementById("saveBtn").disabled = (accumulatedTime < 1.0);
    };

    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
  } catch(e) {
    alert("System Error: " + e.message);
  }
}

function generateFile() {
  if (leftChannel.length === 0) return;
  const flattened = flattenArray(leftChannel, leftChannel.length * 4096);
  const wavBlob = createWavBlob(flattened, audioContext.sampleRate);
  const url = URL.createObjectURL(wavBlob);

  const card = document.createElement("div");
  card.className = "recording-card";
  card.innerHTML = `<div style="color:#00ff88; font-size:0.8rem">LOG: ${new Date().toLocaleTimeString()}</div>
                    <div>Voice Length: ${accumulatedTime.toFixed(1)}s</div>
                    <audio controls src="${url}"></audio>`;
  document.getElementById("recordings").prepend(card);
  leftChannel = [];
  accumulatedTime = 0;
}

function shutdown() {
  if (stream) stream.getTracks().forEach(track => track.stop());
  if (processor) processor.disconnect();
  if (audioContext) audioContext.close();
  if (wakeLock) {
    wakeLock.release();
    wakeLock = null;
  }
  document.getElementById("startBtn").disabled = false;
  document.getElementById("stopBtn").disabled = true;
  document.getElementById("saveBtn").disabled = true;
  document.getElementById("status-text").innerText = "OFFLINE";
  document.getElementById("wake-info").innerText = "BACKGROUND LOCK: INACTIVE";
  document.getElementById("wake-info").style.color = "#ff0055";
}

// --- WAV HELPERS (Keep as is) ---
function flattenArray(channelBuffer, recordingLength) {
  let result = new Float32Array(recordingLength);
  let offset = 0;
  for (let i = 0; i < channelBuffer.length; i++) {
    result.set(channelBuffer[i], offset);
    offset += channelBuffer[i].length;
  }
  return result;
}

function createWavBlob(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);
  const writeString = (v, o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 32 + samples.length * 2, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(view, 36, 'data');
  view.setUint32(40, samples.length * 2, true);
  let offset = 44;
  for (let i = 0; i < samples.length; i++, offset += 2) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([view], { type: 'audio/wav' });
}
</script>
</body>
</html>
