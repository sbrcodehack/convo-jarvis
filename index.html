<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConvoJarvis - Human Voice Recorder</title>

  <!-- Style -->
  <style>
    body {
      background: black;
      color: #00f7ff;
      font-family: Arial;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    button {
      background: #00f7ff;
      color: black;
      border: none;
      padding: 12px 20px;
      margin: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    #status {
      font-size: 20px;
      margin: 10px;
    }

    #recordings audio {
      display: block;
      margin: 10px auto;
    }

    .box {
      border: 1px solid #00f7ff;
      padding: 10px;
      margin-top: 15px;
    }
  </style>

  <!-- 🔥 VAD Library -->
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web/dist/vad.min.js"></script>
</head>

<body>

<div class="container">
  <h1>🧠 ConvoJarvis</h1>

  <button onclick="startListening()">🎤 Start Listening</button>
  <button onclick="stopListening()">⛔ Stop</button>

  <div id="status">Status: Idle</div>

  <div class="box">
    <h3>Saved Voice Chunks (Auto every 2 min)</h3>
    <div id="recordings"></div>
  </div>
</div>

<!-- App Logic -->
<script src="app.js"></script>

</body>
</html>
