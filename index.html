<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConvoJarvis - Working Version</title>

  <style>
    body {
      background: black;
      color: #00f7ff;
      font-family: Arial;
      text-align: center;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      background: #00f7ff;
      border: none;
      cursor: pointer;
    }

    #status {
      font-size: 22px;
      margin: 15px;
    }

    audio {
      display: block;
      margin: 10px auto;
    }
  </style>

  <!-- ✅ Stable VAD CDN -->
  <script src="https://unpkg.com/@ricky0123/vad-web/dist/vad.min.js"></script>
</head>
<body>

<h1>🧠 ConvoJarvis</h1>

<button onclick="start()">🎤 Start</button>
<button onclick="stop()">⛔ Stop</button>

<div id="status">Idle</div>

<h3>Saved Recordings</h3>
<div id="recordings"></div>

<script src="app.js"></script>

</body>
</html>
